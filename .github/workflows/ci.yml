name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      MEDUSA_DISABLE_TELEMETRY: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --ignore-scripts: @medusajs/telemetry's postinstall hangs on GH runners
      # (run 27052886568 — npm ci silent for 15 min after reify). Native bindings
      # (@swc/core, esbuild) ship via optionalDependencies, no scripts needed.
      # Also standard npm supply-chain hardening.
      - name: Install
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (medusa plugin:build)
        run: npm run build

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
